<title>NlsCoberturas</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  scroll-behavior:smooth;
  background:#f5f5f5;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  color:#fff;
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  z-index:1000;
}

header h1{
  color:#f5c400;
}

nav a{
  color:#fff;
  margin-left:15px;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(#111,#333);
  color:#fff;
}

.hero h2{
  font-size:40px;
  color:#f5c400;
}

.btn{
  margin-top:20px;
  padding:12px 20px;
  background:#25D366;
  color:#fff;
  border-radius:5px;
  text-decoration:none;
}

/* SEÇÕES */
section{
  padding:80px 20px;
  text-align:center;
}

/* GALERIA */
.galeria{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.galeria img{
  width:100%;
  border-radius:10px;
  transition:0.3s;
}

.galeria img:hover{
  transform:scale(1.05);
}

/* WHATSAPP FIXO */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:15px;
  border-radius:50px;
  text-decoration:none;
}
</style>
</head>
