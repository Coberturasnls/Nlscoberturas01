<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NlsCoberturas | Coberturas Profissionais</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6f8;
      color: #222;
    }

    header {
      background: #0d0d0d;
      color: white;
      padding: 25px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .hero {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('IMG-2026702-WA0031~3.jpg') center/cover no-repeat;
      height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    .hero h1 {
      font-size: 42px;
    }

    .hero p {
      margin-top: 10px;
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #25D366;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 30px;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 26px;
      border-left: 5px solid #25D366;
      padding-left: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .info {
      padding: 15px;
      text-align: center;
    }

    .whatsapp-fixed {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px 18px;
      border-radius: 50px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #0d0d0d;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  NlsCoberturas
</header>

<section class="hero">
  <div>
    <h1>Coberturas Profissionais de Alta Qualidade</h1>
    <p>Estruturas resistentes, modernas e sob medida para você</p>
    <a class="btn" href="https://wa.me/5511948075205" target="_blank">
      Solicitar Orçamento
    </a>
  </div>
</section>

<div class="container">

  <h2>Nossos Trabalhos</h2>

  <div class="grid">

    <div class="card">
      <img src="IMG-2026702-WA0031~3.jpg" alt="trabalho">
      <div class="info">Cobertura instalada com acabamento reforçado</div>
    </div>

  </div>

</div>

<a class="whatsapp-fixed" href="https://wa.me/5511948075205" target="_blank">
  WhatsApp
</a>

<footer>
  © 2026 NlsCoberturas - Todos os direitos reservados
</footer>

</body>
</html>
